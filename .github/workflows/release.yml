name: Release container

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  container:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Read reproducible build date
        id: buildinfo
        run: echo "build_date=$(git show -s --format=%cI "$GITHUB_SHA")" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/willxup/flowlens
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          sbom: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ steps.buildinfo.outputs.build_date }}
      - name: Record manifest digest
        run: |
          mkdir -p .flowlens-dev/reports
          printf '%s\n' '${{ steps.build.outputs.digest }}' > .flowlens-dev/reports/manifest-digest.txt
          printf '### FlowLens container\n\n- Image: `ghcr.io/willxup/flowlens`\n- Digest: `%s`\n' '${{ steps.build.outputs.digest }}' >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: flowlens-manifest-digest
          path: .flowlens-dev/reports/manifest-digest.txt
          if-no-files-found: error
