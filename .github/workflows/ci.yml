name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          cache: false
      - uses: actions/setup-node@v4
        with:
          node-version: "24.14.0"
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - name: Install dependencies
        run: make deps
      - name: Check source and tests
        run: make check
      - name: Install Chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.flowlens-dev/cache/playwright
        run: pnpm --dir web exec playwright install --with-deps chromium
      - name: Run browser tests
        run: make frontend-e2e
      - name: Verify modules
        run: go mod verify
      - name: Verify release contracts
        run: go test ./test/release -count=1
      - name: Build CGO-disabled Linux binary
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -o .flowlens-dev/flowlens ./cmd/flowlens
      - name: Scan secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
